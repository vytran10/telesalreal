<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalePro BĐS — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080a0f;
  --s1:       #0d1018;
  --s2:       #121520;
  --s3:       #181c2a;
  --b1:       rgba(255,255,255,0.05);
  --b2:       rgba(255,255,255,0.09);
  --b3:       rgba(255,255,255,0.14);
  --t1:       #e8ecf5;
  --t2:       #7c84a0;
  --t3:       #3e4460;
  --accent:   #4f7cff;
  --a2:       #2d55d4;
  --hot:      #ff4d6d;
  --hot-s:    rgba(255,77,109,0.12);
  --warm:     #ff9f43;
  --warm-s:   rgba(255,159,67,0.12);
  --cold:     #48b0ff;
  --cold-s:   rgba(72,176,255,0.12);
  --green:    #2ecc8f;
  --green-s:  rgba(46,204,143,0.12);
  --purple:   #a78bfa;
  --r:        10px;
  --r-lg:     14px;
  --r-xl:     18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);display:flex;font-size:14px}

/* ── SIDEBAR ── */
.sidebar{width:230px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;padding:0}
.brand{padding:22px 20px 20px;border-bottom:1px solid var(--b1)}
.brand-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.brand-logo span{color:var(--accent)}
.brand-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:3px;letter-spacing:.06em}
.nav{padding:14px 10px;flex:1}
.nav-group{margin-bottom:6px}
.nav-sect{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:6px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);font-size:13px;color:var(--t2);cursor:pointer;transition:all .15s;position:relative}
.nav-item:hover{background:var(--s2);color:var(--t1)}
.nav-item.active{background:rgba(79,124,255,0.1);color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:2px}
.ni{width:15px;height:15px;flex-shrink:0;opacity:.6}
.nav-item.active .ni{opacity:1}
.nav-badge{margin-left:auto;background:var(--hot);color:#fff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--b1)}
.ai-pill{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--r);background:var(--s2);border:1px solid var(--b1)}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--hot);flex-shrink:0;transition:background .3s}
.ai-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.ai-txt{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{height:58px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;background:var(--s1)}
.page-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;flex:1;letter-spacing:-.2px}
.search-wrap{position:relative}
.search-input{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:8px 12px 8px 34px;font-size:13px;color:var(--t1);outline:none;width:230px;font-family:'Outfit',sans-serif;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--t3)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── BUTTONS ── */
.btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--a2);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--b2);color:var(--t2);border-radius:var(--r);padding:8px 16px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-ghost:hover{border-color:var(--b3);color:var(--t1);background:var(--s2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:var(--hot-s);color:var(--hot);border:1px solid rgba(255,77,109,.2);border-radius:var(--r);padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-danger:hover{background:rgba(255,77,109,.2)}
.btn-icon{background:var(--s2);border:1px solid var(--b1);color:var(--t2);border-radius:var(--r);padding:8px 10px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-icon:hover{background:var(--s3);color:var(--t1)}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-lg);padding:16px 18px;transition:border-color .15s;cursor:default}
.stat:hover{border-color:var(--b2)}
.stat-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500}
.stat-sub{font-size:11px;color:var(--t3);margin-top:4px}
.c-total .stat-val{color:var(--accent)}
.c-hot   .stat-val{color:var(--hot)}
.c-warm  .stat-val{color:var(--warm)}
.c-cold  .stat-val{color:var(--cold)}
.c-proj  .stat-val{color:var(--purple)}

/* ── FILTER ── */
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.fchip{padding:6px 14px;border-radius:20px;border:1px solid var(--b1);background:transparent;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
.fchip:hover{border-color:var(--b2);color:var(--t1)}
.fchip.act{border-color:var(--accent);background:rgba(79,124,255,.1);color:var(--accent)}
.fchip.hot.act{border-color:var(--hot);background:var(--hot-s);color:var(--hot)}
.fchip.warm.act{border-color:var(--warm);background:var(--warm-s);color:var(--warm)}
.fchip.cold.act{border-color:var(--cold);background:var(--cold-s);color:var(--cold)}
.filter-right{margin-left:auto;display:flex;gap:7px}

/* ── TABLE ── */
.tbl-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-xl);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 16px;text-align:left;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;border-bottom:1px solid var(--b1);background:var(--s2);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--b1);cursor:pointer;transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
td{padding:12px 16px;font-size:13px;color:var(--t2);vertical-align:middle}
td.name{color:var(--t1);font-weight:500}
td.phone{font-family:'JetBrains Mono',monospace;font-size:12px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-hot{background:var(--hot-s);color:var(--hot)}
.b-warm{background:var(--warm-s);color:var(--warm)}
.b-cold{background:var(--cold-s);color:var(--cold)}
.b-done{background:var(--green-s);color:var(--green)}
.b-proj{background:rgba(167,139,250,.1);color:var(--purple);font-size:10px}
.overdue{color:var(--hot);font-weight:600}
.due-today{color:var(--warm);font-weight:600}

/* ── OVERLAY / DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:none;align-items:flex-start;justify-content:flex-end;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.drawer{width:540px;height:100vh;background:var(--s1);border-left:1px solid var(--b2);overflow-y:auto;display:flex;flex-direction:column;animation:slideIn .22s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}
.dh{padding:20px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.dh-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;flex:1}
.db{padding:22px 24px;flex:1}
.df{padding:16px 24px;border-top:1px solid var(--b1);display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}
.fi{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:9px 12px;font-size:13px;color:var(--t1);outline:none;font-family:'Outfit',sans-serif;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--t3)}
.fi-select{cursor:pointer}
.fi-select option{background:var(--s2)}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea.fi{resize:vertical;min-height:70px}

/* ── STATUS PICKER ── */
.status-pick{display:flex;gap:8px;margin-bottom:16px}
.sp{flex:1;padding:11px 8px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s2);text-align:center;cursor:pointer;transition:all .18s;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif}
.sp:hover{border-color:var(--b2)}
.sp.hot.active{background:var(--hot-s);border-color:var(--hot);color:var(--hot)}
.sp.warm.active{background:var(--warm-s);border-color:var(--warm);color:var(--warm)}
.sp.cold.active{background:var(--cold-s);border-color:var(--cold);color:var(--cold)}

/* ── AI BOX ── */
.ai-box{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-lg);padding:16px;margin-bottom:16px}
.ai-box-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.ai-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ai-q{padding:4px 10px;border-radius:20px;border:1px solid var(--b1);font-size:11px;color:var(--t3);cursor:pointer;transition:all .12s;font-family:'Outfit',sans-serif}
.ai-q:hover{border-color:var(--b2);color:var(--t2)}
.ai-input-row{display:flex;gap:8px}
.ai-input-row input{flex:1;background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--t1);outline:none;font-family:'Outfit',sans-serif;transition:border-color .15s}
.ai-input-row input:focus{border-color:var(--accent)}
.ai-result{margin-top:10px;background:var(--bg);border-radius:var(--r);padding:13px;font-size:13px;color:var(--t1);line-height:1.75;white-space:pre-wrap;border-left:2px solid var(--green);display:none}
.ai-result.show{display:block}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--green);display:inline-block;animation:dt 1.2s infinite;margin:0 1px}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dt{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── CALL LOG ── */
.cl-item{padding:11px 13px;border-radius:var(--r);border:1px solid var(--b1);margin-bottom:7px;background:var(--s2)}
.cl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cl-time{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.cl-text{font-size:13px;color:var(--t2);line-height:1.55}

/* ── PROJECT CARDS ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.proj-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-xl);padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.proj-card.apt::before{background:linear-gradient(90deg,var(--accent),var(--purple))}
.proj-card.land::before{background:linear-gradient(90deg,var(--green),var(--cold))}
.proj-card.villa::before{background:linear-gradient(90deg,var(--warm),var(--hot))}
.proj-card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.proj-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;color:var(--t3)}
.proj-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--t1);margin-bottom:6px}
.proj-meta{font-size:12px;color:var(--t2);line-height:1.6}
.proj-stats{display:flex;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--b1)}
.ps{text-align:center;flex:1}
.ps-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;color:var(--t1)}
.ps-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.add-proj-card{background:transparent;border:1px dashed var(--b2);border-radius:var(--r-xl);padding:18px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--t3);font-size:13px;min-height:140px}
.add-proj-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,124,255,.04)}

/* ── FOLLOWUP ── */
.fu-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:all .15s}
.fu-card:hover{border-color:var(--b2);background:var(--s2)}
.fu-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.fu-info{flex:1}
.fu-name{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:3px}
.fu-meta{font-size:12px;color:var(--t3)}
.fu-note{font-size:13px;color:var(--t2);margin-top:5px;line-height:1.5}

/* ── SETTINGS ── */
.sett-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-xl);padding:22px;margin-bottom:14px}
.sett-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--b1);color:var(--t1)}
.sett-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--b1)}
.sett-row:last-child{border-bottom:none}
.sett-lbl{flex:1;font-size:13px;color:var(--t2)}
.sett-lbl small{display:block;font-size:11px;color:var(--t3);margin-top:2px;line-height:1.5}

/* ── ALERT ── */
.alert{border-radius:var(--r-lg);padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:10px;cursor:pointer}
.alert-warm{background:var(--warm-s);border:1px solid rgba(255,159,67,.2);color:var(--warm)}
.alert-hot{background:var(--hot-s);border:1px solid rgba(255,77,109,.2);color:var(--hot)}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-ico{font-size:38px;margin-bottom:14px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">
    <div class="brand-logo">Sale<span>Pro</span></div>
    <div class="brand-tag">BĐS · CRM · AI-powered</div>
  </div>
  <nav class="nav">
    <div class="nav-group">
      <div class="nav-sect">Chính</div>
      <div class="nav-item active" data-page="dashboard">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="customers">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5"/></svg>
        Khách hàng
      </div>
      <div class="nav-item" data-page="projects">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14V7l6-5 6 5v7"/><rect x="6" y="10" width="4" height="4"/></svg>
        Dự án
      </div>
      <div class="nav-item" data-page="followup">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M8 5v6"/></svg>
        Follow-up
        <span class="nav-badge" id="fu-badge" style="display:none"></span>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-sect">Hệ thống</div>
      <div class="nav-item" data-page="settings">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
        Cài đặt
      </div>
    </div>
  </nav>
  <div class="sidebar-foot">
    <div class="ai-pill">
      <div class="ai-dot" id="ai-dot"></div>
      <div class="ai-txt" id="ai-lbl">AI chưa kết nối</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input class="search-input" id="gsearch" placeholder="Tìm khách, dự án..." oninput="handleSearch(this.value)">
    </div>
    <button class="btn" onclick="openAddCustomer()">＋ Thêm khách</button>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="handleOvClick(event)">
  <div class="drawer" id="drawer">
    <div class="dh">
      <div class="dh-title" id="drawer-title">Thêm khách hàng</div>
      <button class="btn-icon" onclick="closeDrawer()">✕</button>
    </div>
    <div class="db" id="drawer-body"></div>
    <div class="df" id="drawer-footer"></div>
  </div>
</div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ── CONFIG ── (anh thay REPLACE_API_KEY bằng key Firebase)
const firebaseConfig = {
  apiKey:            "REPLACE_API_KEY",
  authDomain:        "telesale4bds.firebaseapp.com",
  projectId:         "telesale4bds",
  storageBucket:     "telesale4bds.firebasestorage.app",
  messagingSenderId: "544226736770",
  appId:             "1:544226736770:web:c28fe9743e0b2b85b0929b"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

// ── STATE ──
let customers = [], projects = [];
let page     = "dashboard";
let filter   = "all";
let projFilter = "all";
let sq       = "";
let editId   = null;
let drawerMode = "customer"; // customer | project
let GROQ_KEY = localStorage.getItem("bds_groq_key") || "";

// ── BDS TYPES ──
const BDS_TYPES = [
  { value:"apt",   label:"Căn hộ chung cư",       icon:"🏢" },
  { value:"land",  label:"Đất nền dự án",          icon:"🌿" },

// ── NAV ──
window.setPage = p => {
  page = p;
  const titles = {dashboard:"Dashboard",customers:"Khách hàng",projects:"Dự án BĐS",followup:"Follow-up",settings:"Cài đặt"};
  document.getElementById("page-title").textContent = titles[p]||p;
  document.querySelectorAll(".nav-item[data-page]").forEach(n=>n.classList.toggle("active",n.dataset.page===p));
  renderPage();
};

// ── RENDER ──
window.renderPage = () => {
  const c = document.getElementById("mainContent");
  if      (page==="dashboard") c.innerHTML = renderDashboard();
  else if (page==="customers") c.innerHTML = renderCustomers();
  else if (page==="projects")  c.innerHTML = renderProjects();
  else if (page==="followup")  c.innerHTML = renderFollowup();

// ── DASHBOARD ──
function renderDashboard() {
  const tot  = customers.length;
  const hot  = customers.filter(c=>c.status==="hot").length;
  const warm = customers.filter(c=>c.status==="warm").length;
  const cold = customers.filter(c=>c.status==="cold").length;
  const nprj = projects.length;
  const tod  = getTodayFU().length;

  const recent = customers.slice(0,6);

  return `
  <div class="stats-grid">
    <div class="stat c-total"><div class="stat-lbl">Tổng khách</div><div class="stat-val">${tot}</div><div class="stat-sub">trong hệ thống</div></div>
    <div class="stat c-hot"  ><div class="stat-lbl">🔥 Nóng</div><div class="stat-val">${hot}</div><div class="stat-sub">cần chốt ngay</div></div>
    <div class="stat c-warm" ><div class="stat-lbl">🌤 Ấm</div><div class="stat-val">${warm}</div><div class="stat-sub">đang nuôi dưỡng</div></div>
    <div class="stat c-cold" ><div class="stat-lbl">❄ Lạnh</div><div class="stat-val">${cold}</div><div class="stat-sub">tái kích hoạt</div></div>
    <div class="stat c-proj" ><div class="stat-lbl">🏗 Dự án</div><div class="stat-val">${nprj}</div><div class="stat-sub">đang quản lý</div></div>
  </div>
  ${tod>0?`<div class="alert alert-warm" onclick="setPage('followup')">⏰ Hôm nay có <strong>${tod}</strong> khách cần follow-up — Xem ngay →</div>`:""}
  <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Khách gần đây</div>
  <div class="tbl-wrap">${renderTable(recent)}</div>`;
}

// ── CUSTOMERS ──
function renderCustomers() {
  let list = customers;
  if (filter!=="all") list = list.filter(c=>c.status===filter);
  if (projFilter!=="all") list = list.filter(c=>c.projectId===projFilter);
  if (sq) list = list.filter(c=>
    (c.name||"").toLowerCase().includes(sq)||
    (c.phone||"").includes(sq)||
    (c.note||"").toLowerCase().includes(sq)||
    (c.projectName||"").toLowerCase().includes(sq)
  );

  const projOpts = projects.map(p=>`<button class="fchip ${projFilter===p.id?'act':''}" data-pf="${p.id}">${p.name}</button>`).join("");

  return `
  <div class="filter-row">
    <button class="fchip ${filter==="all"?"act":""}" data-f="all">Tất cả (${customers.length})</button>
    <button class="fchip hot ${filter==="hot"?"act":""}" data-f="hot">🔥 Nóng (${customers.filter(c=>c.status==="hot").length})</button>
    <button class="fchip warm ${filter==="warm"?"act":""}" data-f="warm">🌤 Ấm (${customers.filter(c=>c.status==="warm").length})</button>
    <button class="fchip cold ${filter==="cold"?"act":""}" data-f="cold">❄ Lạnh (${customers.filter(c=>c.status==="cold").length})</button>
    ${projOpts}
  </div>
  <div class="tbl-wrap">${list.length?renderTable(list):'<div class="empty"><div class="empty-ico">🔍</div>Không tìm thấy khách nào</div>'}</div>`;
}

function renderTable(list) {
  if (!list.length) return `<div class="empty"><div class="empty-ico">👤</div>Chưa có khách hàng<br><small style="display:block;margin-top:8px">Bấm "+ Thêm khách" để bắt đầu</small></div>`;
  return `<table><thead><tr>
    <th>Họ tên</th><th>SĐT</th><th>Dự án</th><th>Ngân sách</th><th>Trạng thái</th><th>Follow-up</th><th>Ghi chú</th>
  </tr></thead><tbody>${list.map(c=>{
    const bm  = c.status==="hot"?"b-hot":c.status==="warm"?"b-warm":"b-cold";
    const bl  = c.status==="hot"?"🔥 Nóng":c.status==="warm"?"🌤 Ấm":"❄ Lạnh";
    const fu  = c.followupDate?formatFU(c.followupDate):'<span style="color:var(--t3)">—</span>';
    const pn  = c.projectName?`<span class="badge b-proj">${c.projectName}</span>`:'<span style="color:var(--t3)">—</span>';
    return `<tr onclick="openEditCustomer('${c.id}')">
      <td class="name">${c.name||"—"}</td>
      <td class="phone">${c.phone||"—"}</td>
      <td>${pn}</td>
      <td>${c.budget||"—"}</td>
      <td><span class="badge ${bm}">${bl}</span></td>
      <td>${fu}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.note?c.note.substring(0,40):"—"}</td>
    </tr>`;
  }).join("")}</tbody></table>`;
}

// ── PROJECTS ──
function renderProjects() {
  const cards = projects.map(p=>{
    const t   = TYPE_MAP[p.type]||TYPE_MAP.other;
    const cnt = customers.filter(c=>c.projectId===p.id).length;
    const hot = customers.filter(c=>c.projectId===p.id&&c.status==="hot").length;
    return `<div class="proj-card ${p.type||'apt'}" onclick="openEditProject('${p.id}')">
      <div class="proj-type">${t.icon} ${t.label}</div>
      <div class="proj-name">${p.name||"Chưa đặt tên"}</div>
      <div class="proj-meta">${p.location||""}${p.priceRange?` · ${p.priceRange}`:""}</div>
      <div class="proj-stats">
        <div class="ps"><div class="ps-val">${cnt}</div><div class="ps-lbl">Khách</div></div>
        <div class="ps"><div class="ps-val" style="color:var(--hot)">${hot}</div><div class="ps-lbl">Nóng</div></div>
        <div class="ps"><div class="ps-val" style="color:var(--purple)">${p.commission||"—"}</div><div class="ps-lbl">Hoa hồng</div></div>
      </div>
    </div>`;
  }).join("");
  return `
  <div class="proj-grid">
    ${cards}
    <div class="add-proj-card" onclick="openAddProject()">＋ Thêm dự án mới</div>
  </div>`;
}

// ── FOLLOWUP ──
function renderFollowup() {
  const tod  = getTodayFU();
  const soon = getUpcomingFU();
  const card = (c,cls) => {
    const dot = c.status==="hot"?"var(--hot)":c.status==="warm"?"var(--warm)":"var(--cold)";
    const pn  = c.projectName?`<span class="badge b-proj" style="margin-left:6px">${c.projectName}</span>`:"";
    return `<div class="fu-card" onclick="openEditCustomer('${c.id}')">
      <div class="fu-dot" style="background:${dot}"></div>
      <div class="fu-info">
        <div class="fu-name">${c.name||"—"}${pn} <span style="color:var(--t3);font-size:12px;font-weight:400">· ${c.phone||""}</span></div>
        <div class="fu-meta ${cls}">${c.followupDate} · ${c.budget||"Chưa rõ ngân sách"}</div>
        ${c.note?`<div class="fu-note">${c.note}</div>`:""}
      </div>
      <button class="btn btn-sm" onclick="event.stopPropagation();quickZalo('${c.id}')">AI Zalo ↗</button>
    </div>`;
  };
  return `
  ${tod.length?`<div style="font-size:10px;font-weight:700;color:var(--hot);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">⏰ Hôm nay (${tod.length})</div>${tod.map(c=>card(c,"due-today")).join("")}<div style="height:18px"></div>`:""}
  ${soon.length?`<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">📅 Sắp tới (7 ngày)</div>${soon.map(c=>card(c,"")).join("")}`:""}

}

window.saveCustomer = async () => {
  const status = document.querySelector(".sp.active")?.dataset.s || "warm";
  const projId = document.getElementById("f-proj")?.value || "";
  const proj   = projects.find(p=>p.id===projId);
  const data   = {
    name:        document.getElementById("f-name").value.trim(),
    phone:       document.getElementById("f-phone").value.trim(),
    projectId:   projId,
    projectName: proj?.name || "",
    budget:      document.getElementById("f-budget").value.trim(),
    purpose:     document.getElementById("f-purpose").value,
    area:        document.getElementById("f-area").value.trim(),
    source:      document.getElementById("f-src").value.trim(),
    status,
    followupDate:document.getElementById("f-fu").value,
    roomType:    document.getElementById("f-room").value.trim(),
    note:        document.getElementById("f-note").value.trim(),
    updatedAt:   serverTimestamp()
  };
  if (!data.name) { alert("Nhập tên khách trước nhé anh!"); return; }
  try {
    if (editId) { await updateDoc(doc(db,"customers",editId), data); }
    else { data.createdAt=serverTimestamp(); data.callLogs=[]; await addDoc(collection(db,"customers"),data); }
    closeDrawer();
  } catch(e) { alert("Lỗi: "+e.message); }
};

    legal:      document.getElementById("p-legal").value.trim(),
    amenities:  document.getElementById("p-amen").value.trim(),
    policy:     document.getElementById("p-policy").value.trim(),
    pitch:      document.getElementById("p-pitch").value.trim(),
    note:       document.getElementById("p-note").value.trim(),
    updatedAt:  serverTimestamp()
  };
  if (!data.name) { alert("Nhập tên dự án trước nhé anh!"); return; }
  try {
    if (editId) { await updateDoc(doc(db,"projects",editId),data); }
    else { data.createdAt=serverTimestamp(); await addDoc(collection(db,"projects"),data); }
    closeDrawer();
  } catch(e) { alert("Lỗi: "+e.message); }
};

window.delCustomer = async id => {
  if (!confirm("Xóa khách hàng này?")) return;
  await deleteDoc(doc(db,"customers",id)); closeDrawer();
};

window.delProject = async id => {
  if (!confirm("Xóa dự án này? Khách hàng liên kết sẽ không bị xóa.")) return;
  await deleteDoc(doc(db,"projects",id)); closeDrawer();
};

window.addLog = async () => {
  const text = document.getElementById("new-log").value.trim();
  if (!text || !editId) return;
  const c      = customers.find(x=>x.id===editId);
  const status = document.querySelector(".sp.active")?.dataset.s || c?.status || "warm";
  const logs   = [...(c?.callLogs||[]), { text, status, time: new Date().toLocaleString("vi-VN") }];
  await updateDoc(doc(db,"customers",editId), {callLogs:logs});
  document.getElementById("new-log").value = "";
  document.getElementById("call-logs").innerHTML = renderLogs(logs);
};

// ── AI ──
window.setAI = t => { document.getElementById("ai-sit").value = t; };

window.callAI = async () => {
  if (!GROQ_KEY) { alert("Vào Cài đặt nhập Groq API key nhé anh!"); return; }
  const sit = document.getElementById("ai-sit")?.value.trim();
  if (!sit) { alert("Nhập tình huống trước nhé!"); return; }
  const c    = customers.find(x=>x.id===editId);
  const proj = projects.find(p=>p.id===c?.projectId);
  const res  = document.getElementById("ai-res");
  res.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> AI đang soạn...';
  res.classList.add("show");

  const ctx = [
    c ? `Khách: ${c.name}, SĐT ${c.phone}, ngân sách ${c.budget||"chưa rõ"}, mục đích ${c.purpose||"chưa rõ"}, trạng thái ${c.status==="hot"?"Nóng":c.status==="warm"?"Ấm":"Lạnh"}.` : "",
    c?.note ? `Ghi chú: ${c.note}.` : "",
    proj ? `Dự án: ${proj.name} (${TYPE_MAP[proj.type]?.label||""}), khu vực ${proj.location||""}, giá ${proj.priceRange||""}, ${proj.amenities||""}.` : "",
    proj?.policy ? `Chính sách: ${proj.policy}.` : "",
    proj?.pitch  ? `Điểm mạnh: ${proj.pitch}.` : ""
  ].filter(Boolean).join(" ");

  try {
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
      body: JSON.stringify({
        model:"llama-3.3-70b-versatile",
        messages:[
          {role:"system",content:`Bạn là chuyên gia telesale BĐS Việt Nam chuyên nghiệp. ${ctx} Trả lời tiếng Việt, ngắn gọn, thực chiến. Nếu soạn tin Zalo thì viết tin sẵn sàng gửi. Nếu xử lý objection thì đưa câu thoại + 1 tip.`},
          {role:"user",content:sit}
        ],
        max_tokens:600, temperature:0.72
      })
    });
    const d = await r.json();
    if (d.error){res.textContent="Lỗi: "+d.error.message;return;}
    res.textContent = d.choices?.[0]?.message?.content||"Không lấy được gợi ý.";
  } catch(e) { res.textContent="Lỗi kết nối. Kiểm tra API key và internet."; }
};

window.quickZalo = id => { openEditCustomer(id); setTimeout(()=>{setAI("Soạn tin Zalo follow-up phù hợp với thông tin khách này");callAI();},400); };

window.analyzeCustomer = async () => {
  if (!GROQ_KEY) { alert("Vào Cài đặt nhập Groq API key nhé anh!"); return; }
  const c    = customers.find(x=>x.id===editId);
  const proj = projects.find(p=>p.id===c?.projectId);
  const res  = document.getElementById("ai-analysis");
  res.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> AI đang phân tích toàn bộ lịch sử...';
  res.classList.add("show");

  // Build full call history context
  const logs = (c?.callLogs||[]);
  const historyCtx = logs.length
    ? logs.map((l,i)=>`Lần ${i+1} [${l.time}] - Trạng thái: ${l.status==="hot"?"Nóng":l.status==="warm"?"Ấm":"Lạnh"} - Ghi chú: ${l.text}`).join("\n")
    : "Chưa có lịch sử cuộc gọi.";

  const customerCtx = [
    `Khách: ${c?.name||"?"}, SĐT: ${c?.phone||"?"}`,
    `Ngân sách: ${c?.budget||"chưa rõ"}`,
    `Mục đích: ${c?.purpose||"chưa rõ"}`,
    `Khu vực quan tâm: ${c?.area||"chưa rõ"}`,
    `Trạng thái hiện tại: ${c?.status==="hot"?"Nóng":c?.status==="warm"?"Ấm":"Lạnh"}`,
    c?.note ? `Ghi chú: ${c.note}` : ""
  ].filter(Boolean).join(", ");

  const projCtx = proj ? [
    `Dự án: ${proj.name} (${TYPE_MAP[proj.type]?.label||""})`,
    proj.location    ? `Khu vực: ${proj.location}` : "",
    proj.priceRange  ? `Giá: ${proj.priceRange}` : "",
    proj.policy      ? `Chính sách: ${proj.policy}` : "",
    proj.pitch       ? `Điểm mạnh: ${proj.pitch}` : "",
    proj.amenities   ? `Tiện ích: ${proj.amenities}` : ""
  ].filter(Boolean).join(". ") : "Chưa gắn dự án cụ thể.";

  const prompt = `Bạn là chuyên gia telesale BĐS Việt Nam với 10 năm kinh nghiệm.

THÔNG TIN KHÁCH HÀNG:
${customerCtx}

DỰ ÁN QUAN TÂM:
${projCtx}

LỊCH SỬ ${logs.length} CUỘC GỌI:
${historyCtx}

Hãy phân tích kỹ và đưa ra:

1. 🔍 ĐÁNH GIÁ TÌNH TRẠNG
Khách đang ở giai đoạn nào trong hành trình mua? Họ thực sự đang nghĩ gì?

2. 🎯 LÝ DO THẬT SỰ CHƯA CHỐT
Dựa vào lịch sử, lý do thật sự (không phải lý do họ nói) là gì?

3. 💡 CHIẾN LƯỢC TÁI KÍCH HOẠT
3 bước cụ thể để câu kéo lại khách này, phù hợp với tình huống thực tế.

4. 📞 CÂU MỞ ĐẦU CUỘC GỌI TIẾP THEO
Viết đúng 1 câu mở đầu tự nhiên, không sáo rỗng, dùng được ngay.

5. ⚠️ ĐIỀU TUYỆT ĐỐI KHÔNG NÊN LÀM
Với khách hàng cụ thể này, tránh điều gì.

Trả lời tiếng Việt, thực chiến, cụ thể — không chung chung.`;

  try {
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
      body: JSON.stringify({
        model:"llama-3.3-70b-versatile",
        messages:[{role:"user",content:prompt}],
        max_tokens:1200,
        temperature:0.65
      })
    });
    const d = await r.json();
    if (d.error){res.textContent="Lỗi: "+d.error.message;return;}
    res.textContent = d.choices?.[0]?.message?.content||"Không lấy được phân tích.";
  } catch(e) { res.textContent="Lỗi kết nối. Kiểm tra API key và internet."; }
};

window.closeDrawer  = () => { document.getElementById("overlay").classList.remove("show"); editId=null; };
window.handleOvClick = e => { if(e.target===document.getElementById("overlay"))closeDrawer(); };

window.saveGroq = () => {
  const v = document.getElementById("groq-inp").value.trim();
  if (!v) return;
  GROQ_KEY = v; localStorage.setItem("bds_groq_key",v);
  document.getElementById("groq-st").textContent = "✓ Đã lưu! AI sẵn sàng hoạt động";
  updateAIStatus();
};

window.exportData = () => {
  const blob = new Blob([JSON.stringify({customers,projects},null,2)],{type:"application/json"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`salepro_bds_${new Date().toISOString().slice(0,10)}.json`; a.click();
};

// ── UTILS ──
function getTodayFU() {
  const t = new Date().toISOString().slice(0,10);
  return customers.filter(c=>c.followupDate&&c.followupDate<=t);
}
function getUpcomingFU() {
  const t = new Date().toISOString().slice(0,10);
  const w = new Date(Date.now()+7*864e5).toISOString().slice(0,10);
  return customers.filter(c=>c.followupDate&&c.followupDate>t&&c.followupDate<=w);
}
function formatFU(d) {
  const t = new Date().toISOString().slice(0,10);
  if (d<t)  return `<span class="overdue">⚠ ${d}</span>`;
  if (d===t) return `<span class="due-today">⏰ Hôm nay</span>`;
  return `<span style="color:var(--t2)">${d}</span>`;
}
function updateBadge() {
  const n=getTodayFU().length, el=document.getElementById("fu-badge");
  el.textContent=n; el.style.display=n?"inline":"none";
}
function updateAIStatus() {
  const dot=document.getElementById("ai-dot"), lbl=document.getElementById("ai-lbl");
  if(GROQ_KEY){dot.classList.add("on");lbl.textContent="Groq AI · Ready";}
  else{dot.classList.remove("on");lbl.textContent="AI chưa kết nối";}
}
function attachEvents() {
  document.querySelectorAll("[data-f]").forEach(el=>el.addEventListener("click",()=>{filter=el.dataset.f;renderPage();}));
  document.querySelectorAll("[data-pf]").forEach(el=>el.addEventListener("click",()=>{projFilter=el.dataset.pf;renderPage();}));
}
window.handleSearch = v => { sq=v.toLowerCase(); if(page!=="customers")setPage("customers"); else renderPage(); };

// ── INIT ──
updateAIStatus();
renderPage();
</script>
