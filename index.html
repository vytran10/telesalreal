<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telesale BĐS — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0d10;
  --surface:  #13141a;
  --surface2: #1a1c24;
  --surface3: #21242f;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.11);
  --text1:    #eceef4;
  --text2:    #8b90a7;
  --text3:    #4e5268;
  --accent:   #5b7fff;
  --accent2:  #3d5fe0;
  --hot:      #ff5c5c;
  --hot-bg:   rgba(255,92,92,0.1);
  --warm:     #f5a623;
  --warm-bg:  rgba(245,166,35,0.1);
  --cold:     #4da3ff;
  --cold-bg:  rgba(77,163,255,0.1);
  --green:    #2dcc8f;
  --green-bg: rgba(45,204,143,0.1);
  --r:        8px;
  --r-lg:     12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text1);display:flex;font-size:14px}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0}
.brand{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.brand-name{font-family:'Sora',sans-serif;font-size:17px;font-weight:700;color:var(--text1)}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}
.nav-section{padding:0 12px;margin-bottom:4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text1)}
.nav-item.active{background:rgba(91,127,255,0.12);color:var(--accent)}
.nav-icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
.api-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.api-dot.off{background:var(--hot)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;background:var(--surface)}
.topbar-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;flex:1}
.search-wrap{position:relative}
.search-wrap input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 12px 7px 34px;font-size:13px;color:var(--text1);outline:none;width:220px;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);padding:7px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text1);background:var(--surface2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:var(--hot-bg);color:var(--hot);border:none;border-radius:var(--r);padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-danger:hover{background:rgba(255,92,92,0.2)}

.content{flex:1;overflow-y:auto;padding:24px}

/* ── DASHBOARD ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.stat-num{font-family:'Sora',sans-serif;font-size:26px;font-weight:700}
.stat-sub{font-size:12px;color:var(--text3);margin-top:4px}
.stat-hot .stat-num{color:var(--hot)}
.stat-warm .stat-num{color:var(--warm)}
.stat-cold .stat-num{color:var(--cold)}
.stat-total .stat-num{color:var(--accent)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.filter-chip:hover{border-color:var(--border2);color:var(--text1)}
.filter-chip.active{background:rgba(91,127,255,0.12);border-color:var(--accent);color:var(--accent)}
.filter-chip.hot.active{background:var(--hot-bg);border-color:var(--hot);color:var(--hot)}
.filter-chip.warm.active{background:var(--warm-bg);border-color:var(--warm);color:var(--warm)}
.filter-chip.cold.active{background:var(--cold-bg);border-color:var(--cold);color:var(--cold)}
.filter-right{margin-left:auto;display:flex;gap:8px}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:var(--surface2)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:12px 16px;font-size:13px;color:var(--text2)}
tbody td.name{color:var(--text1);font-weight:500}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-hot{background:var(--hot-bg);color:var(--hot)}
.badge-warm{background:var(--warm-bg);color:var(--warm)}
.badge-cold{background:var(--cold-bg);color:var(--cold)}
.badge-done{background:var(--green-bg);color:var(--green)}
.due-today{color:var(--warm);font-weight:500}
.overdue{color:var(--hot);font-weight:500}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}

/* ── MODAL / DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:flex-start;justify-content:flex-end}
.overlay.show{display:flex}
.drawer{width:520px;height:100vh;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.drawer-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;flex:1}
.drawer-body{padding:24px;flex:1}
.drawer-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.form-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:13px;color:var(--text1);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:72px}
select.form-input{cursor:pointer}
select.form-input option{background:var(--surface2)}

/* ── STATUS PICKER ── */
.status-pick{display:flex;gap:8px;margin-bottom:16px}
.status-opt{flex:1;padding:10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600}
.status-opt:hover{border-color:var(--border2)}
.status-opt.hot.active{background:var(--hot-bg);border-color:var(--hot);color:var(--hot)}
.status-opt.warm.active{background:var(--warm-bg);border-color:var(--warm);color:var(--warm)}
.status-opt.cold.active{background:var(--cold-bg);border-color:var(--cold);color:var(--cold)}

/* ── AI BOX ── */
.ai-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:16px}
.ai-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-input-row{display:flex;gap:8px}
.ai-input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--text1);outline:none;font-family:'DM Sans',sans-serif}
.ai-input-row input:focus{border-color:var(--accent)}
.ai-result{margin-top:10px;background:var(--bg);border-radius:var(--r);padding:12px;font-size:13px;color:var(--text1);line-height:1.75;white-space:pre-wrap;border-left:2px solid var(--green);display:none}
.ai-result.show{display:block}
.dots{display:inline-flex;gap:3px;align-items:center;vertical-align:middle}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--green);animation:dot 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── CALL LOG ── */
.call-log-item{padding:12px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px;background:var(--surface2)}
.call-log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.call-log-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.call-log-note{font-size:13px;color:var(--text2);line-height:1.5}

/* ── FOLLOW-UP PAGE ── */
.followup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:border-color .15s}
.followup-card:hover{border-color:var(--border2)}
.followup-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.followup-info{flex:1}
.followup-name{font-size:14px;font-weight:500;color:var(--text1);margin-bottom:3px}
.followup-meta{font-size:12px;color:var(--text3)}
.followup-note{font-size:13px;color:var(--text2);margin-top:6px}

/* ── SETTINGS ── */
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:16px}
.settings-title{font-size:13px;font-weight:600;color:var(--text1);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{flex:1;font-size:13px;color:var(--text2)}
.settings-label small{display:block;font-size:11px;color:var(--text3);margin-top:2px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">
    <div class="brand-name">Sale<span>BĐS</span></div>
    <div class="brand-sub">CRM · AI-powered</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Chính</div>
    <div class="nav-item active" data-page="dashboard">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Dashboard
    </div>
    <div class="nav-item" data-page="customers">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5"/></svg>
      Danh sách khách
    </div>
    <div class="nav-item" data-page="followup">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M5 5h6M5 11h4"/></svg>
      Follow-up hôm nay
      <span id="followup-badge" style="margin-left:auto;background:var(--hot);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;display:none"></span>
    </div>
  </div>
  <div class="nav-section" style="margin-top:8px">
    <div class="nav-label">Hệ thống</div>
    <div class="nav-item" data-page="settings">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
      Cài đặt
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="api-status">
      <div class="api-dot" id="api-dot"></div>
      <span id="api-label">Chưa kết nối AI</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="globalSearch" placeholder="Tìm khách hàng..." oninput="handleSearch(this.value)">
    </div>
    <button class="btn" onclick="openDrawer()">+ Thêm khách</button>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<!-- DRAWER: Thêm / Sửa khách -->
<div class="overlay" id="drawer-overlay" onclick="handleOverlayClick(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title" id="drawer-title">Thêm khách hàng</div>
      <button class="btn-ghost btn-sm" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-footer" id="drawer-footer"></div>
  </div>
</div>

<!-- Firebase + App -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ── FIREBASE CONFIG (anh thay bằng config mới nhé) ──
const firebaseConfig = {
  apiKey: "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",
  authDomain: "telesale4bds.firebaseapp.com",
  projectId: "telesale4bds",
  storageBucket: "telesale4bds.firebasestorage.app",
  messagingSenderId: "544226736770",
  appId: "1:544226736770:web:c28fe9743e0b2b85b0929b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── GROQ CONFIG ──
let GROQ_KEY = localStorage.getItem("bds_groq_key") || "";

// ── STATE ──
let customers = [];
let activePage   = "dashboard";
let activeFilter = "all";
let searchQuery  = "";
let editingId    = null;

// ── REALTIME LISTENER ──
const q = query(collection(db, "customers"), orderBy("createdAt","desc"));
onSnapshot(q, (snap) => {
  customers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderPage();
  updateFollowupBadge();
});

// ── NAVIGATION ──
window.setPage = function(page) {
  activePage = page;
  document.querySelectorAll(".nav-item").forEach(n => n.classList.toggle("active", n.dataset.page === page));
  const titles = { dashboard:"Dashboard", customers:"Danh sách khách", followup:"Follow-up hôm nay", settings:"Cài đặt" };
  document.getElementById("page-title").textContent = titles[page] || page;
  renderPage();
};

document.querySelectorAll(".nav-item[data-page]").forEach(n =>
  n.addEventListener("click", () => setPage(n.dataset.page))
);

// ── RENDER ──
window.renderPage = function() {
  const c = document.getElementById("mainContent");
  if (activePage === "dashboard") c.innerHTML = renderDashboard();
  else if (activePage === "customers") c.innerHTML = renderCustomers();
  else if (activePage === "followup") c.innerHTML = renderFollowup();
  else if (activePage === "settings") c.innerHTML = renderSettings();
  attachPageEvents();
};

function renderDashboard() {
  const total = customers.length;
  const hot   = customers.filter(c => c.status === "hot").length;
  const warm  = customers.filter(c => c.status === "warm").length;
  const cold  = customers.filter(c => c.status === "cold").length;
  const today = getTodayFollowups().length;

  const recent = customers.slice(0, 8);

  return `
  <div class="stats-row">
    <div class="stat-card stat-total"><div class="stat-label">Tổng khách</div><div class="stat-num">${total}</div><div class="stat-sub">trong hệ thống</div></div>
    <div class="stat-card stat-hot"><div class="stat-label">🔥 Nóng</div><div class="stat-num">${hot}</div><div class="stat-sub">cần chốt ngay</div></div>
    <div class="stat-card stat-warm"><div class="stat-label">🌤 Ấm</div><div class="stat-num">${warm}</div><div class="stat-sub">đang nuôi dưỡng</div></div>
    <div class="stat-card stat-cold"><div class="stat-label">❄ Lạnh</div><div class="stat-num">${cold}</div><div class="stat-sub">cần tái kích hoạt</div></div>
  </div>
  ${today > 0 ? `<div style="background:var(--warm-bg);border:1px solid var(--warm);border-radius:var(--r-lg);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--warm);cursor:pointer" onclick="setPage('followup')">
    ⏰ Hôm nay có <strong>${today}</strong> khách cần follow-up — <u>Xem ngay</u>
  </div>` : ""}
  <div style="margin-bottom:10px;font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Khách gần đây</div>
  <div class="table-wrap">${renderTable(recent)}</div>`;
}

function renderCustomers() {
  let list = customers;
  if (activeFilter !== "all") list = list.filter(c => c.status === activeFilter);
  if (searchQuery) list = list.filter(c =>
    (c.name||"").toLowerCase().includes(searchQuery) ||
    (c.phone||"").includes(searchQuery) ||
    (c.note||"").toLowerCase().includes(searchQuery)
  );

  return `
  <div class="filter-bar">
    <button class="filter-chip ${activeFilter==='all'?'active':''}" data-filter="all">Tất cả (${customers.length})</button>
    <button class="filter-chip hot ${activeFilter==='hot'?'active':''}" data-filter="hot">🔥 Nóng (${customers.filter(c=>c.status==='hot').length})</button>
    <button class="filter-chip warm ${activeFilter==='warm'?'active':''}" data-filter="warm">🌤 Ấm (${customers.filter(c=>c.status==='warm').length})</button>
    <button class="filter-chip cold ${activeFilter==='cold'?'active':''}" data-filter="cold">❄ Lạnh (${customers.filter(c=>c.status==='cold').length})</button>
  </div>
  <div class="table-wrap">${list.length ? renderTable(list) : '<div class="empty"><div class="empty-icon">🔍</div>Không tìm thấy khách nào</div>'}</div>`;
}

function renderTable(list) {
  if (!list.length) return '<div class="empty"><div class="empty-icon">👤</div>Chưa có khách hàng nào<br><small style="margin-top:8px;display:block">Bấm "+ Thêm khách" để bắt đầu</small></div>';
  const rows = list.map(c => {
    const badge = c.status==="hot"?'badge-hot':c.status==="warm"?'badge-warm':'badge-cold';
    const label = c.status==="hot"?'🔥 Nóng':c.status==="warm"?'🌤 Ấm':'❄ Lạnh';
    const fu = c.followupDate ? formatFollowup(c.followupDate) : '<span style="color:var(--text3)">—</span>';
    return `<tr onclick="openDetail('${c.id}')">
      <td class="name">${c.name||"—"}</td>
      <td>${c.phone||"—"}</td>
      <td>${c.budget||"—"}</td>
      <td><span class="badge ${badge}">${label}</span></td>
      <td>${fu}</td>
      <td style="color:var(--text3);font-size:12px">${c.note ? c.note.substring(0,40)+"…" : "—"}</td>
    </tr>`;
  }).join("");
  return `<table><thead><tr>
    <th>Họ tên</th><th>SĐT</th><th>Ngân sách</th><th>Trạng thái</th><th>Follow-up</th><th>Ghi chú</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderFollowup() {
  const todayList = getTodayFollowups();
  const upcomingList = getUpcomingFollowups();

  const renderFuCard = (c, cls) => {
    const dot = c.status==="hot"?'var(--hot)':c.status==="warm"?'var(--warm)':'var(--cold)';
    return `<div class="followup-card" onclick="openDetail('${c.id}')">
      <div class="followup-dot" style="background:${dot}"></div>
      <div class="followup-info">
        <div class="followup-name">${c.name||"—"} <span style="color:var(--text3);font-weight:400;font-size:12px">· ${c.phone||""}</span></div>
        <div class="followup-meta ${cls}">${c.followupDate} · ${c.budget||"Chưa rõ ngân sách"}</div>
        ${c.note ? `<div class="followup-note">${c.note}</div>` : ""}
      </div>
      <button class="btn btn-sm" onclick="event.stopPropagation();openAIZalo('${c.id}')">AI soạn Zalo</button>
    </div>`;
  };

  return `
  ${todayList.length ? `
  <div style="font-size:12px;font-weight:600;color:var(--hot);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">⏰ Hôm nay (${todayList.length})</div>
  ${todayList.map(c=>renderFuCard(c,'due-today')).join("")}
  <div style="height:16px"></div>` : ""}
  ${upcomingList.length ? `
  <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">📅 Sắp tới</div>
  ${upcomingList.map(c=>renderFuCard(c,'')).join("")}` : ""}
  ${!todayList.length && !upcomingList.length ? '<div class="empty"><div class="empty-icon">✅</div>Không có lịch follow-up nào sắp tới</div>' : ""}
  `;
}

function renderSettings() {
  return `
  <div class="settings-section">
    <div class="settings-title">🤖 Kết nối AI (Groq)</div>
    <div class="settings-row">
      <div class="settings-label">Groq API Key<small>Lấy miễn phí tại console.groq.com/keys · Key bắt đầu bằng gsk_...</small></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <input type="password" class="form-input" id="groqKeyInput" placeholder="gsk_..." value="${GROQ_KEY}" style="flex:1">
      <button class="btn" onclick="saveGroqKey()">Lưu key</button>
    </div>
    <div id="groq-status" style="font-size:12px;margin-top:6px;color:var(--green)">${GROQ_KEY ? "✓ Đã kết nối AI" : ""}</div>
  </div>
  <div class="settings-section">
    <div class="settings-title">📊 Dữ liệu</div>
    <div class="settings-row">
      <div class="settings-label">Tổng khách hàng<small>Lưu trữ trên Firebase Firestore</small></div>
      <span style="font-size:13px;color:var(--text1);font-weight:500">${customers.length} khách</span>
    </div>
    <div class="settings-row">
      <div class="settings-label">Export dữ liệu<small>Tải toàn bộ danh sách dạng JSON</small></div>
      <button class="btn-ghost btn-sm" onclick="exportData()">Export JSON</button>
    </div>
  </div>`;
}

// ── DRAWER: Thêm/Sửa khách ──
window.openDrawer = function(id = null) {
  editingId = id;
  const c = id ? customers.find(x=>x.id===id) : null;
  document.getElementById("drawer-title").textContent = id ? "Chi tiết khách hàng" : "Thêm khách hàng";

  document.getElementById("drawer-body").innerHTML = `
  <div class="form-row">
    <div class="form-group"><label class="form-label">Họ tên</label><input class="form-input" id="f-name" placeholder="Nguyễn Văn A" value="${c?.name||""}"></div>
    <div class="form-group"><label class="form-label">Số điện thoại</label><input class="form-input" id="f-phone" placeholder="09xx..." value="${c?.phone||""}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Ngân sách</label><input class="form-input" id="f-budget" placeholder="2.5 tỷ / 15tr/tháng" value="${c?.budget||""}"></div>
    <div class="form-group"><label class="form-label">Mục đích</label>
      <select class="form-input" id="f-purpose">
        <option value="">Chọn...</option>
        <option value="Để ở" ${c?.purpose==="Để ở"?"selected":""}>Để ở</option>
        <option value="Đầu tư - cho thuê" ${c?.purpose==="Đầu tư - cho thuê"?"selected":""}>Đầu tư - cho thuê</option>
        <option value="Đầu tư - bán lại" ${c?.purpose==="Đầu tư - bán lại"?"selected":""}>Đầu tư - bán lại</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Khu vực quan tâm</label><input class="form-input" id="f-area" placeholder="Q7, Q2..." value="${c?.area||""}"></div>
    <div class="form-group"><label class="form-label">Loại căn hộ</label><input class="form-input" id="f-type" placeholder="2PN, 3PN..." value="${c?.roomType||""}"></div>
  </div>
  <div class="form-row full">
    <div class="form-group"><label class="form-label">Trạng thái khách</label>
      <div class="status-pick">
        <div class="status-opt hot ${(c?.status||'warm')==='hot'?'active':''}" data-s="hot">🔥 Nóng</div>
        <div class="status-opt warm ${(c?.status||'warm')==='warm'?'active':''}" data-s="warm">🌤 Ấm</div>
        <div class="status-opt cold ${(c?.status||'warm')==='cold'?'active':''}" data-s="cold">❄ Lạnh</div>
      </div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Ngày follow-up</label><input type="date" class="form-input" id="f-followup" value="${c?.followupDate||""}"></div>
    <div class="form-group"><label class="form-label">Nguồn data</label><input class="form-input" id="f-source" placeholder="Cold call, Zalo, Ref..." value="${c?.source||""}"></div>
  </div>
  <div class="form-row full">
    <div class="form-group"><label class="form-label">Ghi chú</label><textarea class="form-input" id="f-note" placeholder="Quan tâm căn 2PN, hay hỏi về view, vợ chồng trẻ...">${c?.note||""}</textarea></div>
  </div>

  ${id ? `
  <div class="ai-section">
    <div class="ai-section-title">🤖 AI soạn tin Zalo / xử lý tình huống</div>
    <div class="ai-input-row">
      <input id="ai-situation" placeholder="Nhập tình huống cụ thể hoặc chọn nhanh bên dưới..." />
      <button class="btn btn-sm" onclick="callAI()">Gợi ý ↗</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
      ${["Soạn tin Zalo follow-up","Xử lý: không có tiền","Xử lý: cần hỏi vợ/chồng","Xử lý: đang xem chỗ khác","Soạn lời chốt hẹn gặp"].map(t=>`<span style="padding:3px 10px;border-radius:20px;border:1px solid var(--border);font-size:11px;color:var(--text3);cursor:pointer" onclick="document.getElementById('ai-situation').value='${t}'">${t}</span>`).join("")}
    </div>
    <div class="ai-result" id="ai-result"></div>
  </div>

  <div>
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Lịch sử cuộc gọi</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input class="form-input" id="new-log" placeholder="Ghi chú cuộc gọi vừa xong..." style="flex:1;font-size:13px">
      <button class="btn btn-sm" onclick="addCallLog()">Lưu</button>
    </div>
    <div id="call-logs">${renderCallLogs(c?.callLogs||[])}</div>
  </div>` : ""}
  `;

  // Status picker events
  document.querySelectorAll(".status-opt").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".status-opt").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
    });
  });

  document.getElementById("drawer-footer").innerHTML = `
    ${id ? `<button class="btn-danger" onclick="deleteCustomer('${id}')">Xóa</button>` : ""}
    <button class="btn-ghost" onclick="closeDrawer()" style="margin-left:auto">Huỷ</button>
    <button class="btn" onclick="saveCustomer()">${id ? "Cập nhật" : "Lưu khách"}</button>
  `;

  document.getElementById("drawer-overlay").classList.add("show");
};

window.openDetail = function(id) { openDrawer(id); };

window.closeDrawer = function() {
  document.getElementById("drawer-overlay").classList.remove("show");
  editingId = null;
};

window.handleOverlayClick = function(e) {
  if (e.target === document.getElementById("drawer-overlay")) closeDrawer();
};

function renderCallLogs(logs) {
  if (!logs || !logs.length) return '<div style="font-size:13px;color:var(--text3);text-align:center;padding:12px">Chưa có ghi chú cuộc gọi</div>';
  return [...logs].reverse().map(l => `
  <div class="call-log-item">
    <div class="call-log-top"><span class="badge ${l.status==="hot"?'badge-hot':l.status==="warm"?'badge-warm':'badge-cold'}">${l.status==="hot"?'🔥 Nóng':l.status==="warm"?'🌤 Ấm':'❄ Lạnh'}</span><span class="call-log-time">${l.time}</span></div>
    <div class="call-log-note">${l.text}</div>
  </div>`).join("");
}

// ── SAVE / DELETE ──
window.saveCustomer = async function() {
  const status = document.querySelector(".status-opt.active")?.dataset.s || "warm";
  const data = {
    name:       document.getElementById("f-name").value.trim(),
    phone:      document.getElementById("f-phone").value.trim(),
    budget:     document.getElementById("f-budget").value.trim(),
    purpose:    document.getElementById("f-purpose").value,
    area:       document.getElementById("f-area").value.trim(),
    roomType:   document.getElementById("f-type").value.trim(),
    status,
    followupDate: document.getElementById("f-followup").value,
    source:     document.getElementById("f-source").value.trim(),
    note:       document.getElementById("f-note").value.trim(),
    updatedAt:  serverTimestamp()
  };
  if (!data.name) { alert("Anh nhập tên khách trước nhé!"); return; }

  try {
    if (editingId) {
      await updateDoc(doc(db, "customers", editingId), data);
    } else {
      data.createdAt = serverTimestamp();
      data.callLogs = [];
      await addDoc(collection(db, "customers"), data);
    }
    closeDrawer();
  } catch(e) { alert("Lỗi lưu: " + e.message); }
};

window.deleteCustomer = async function(id) {
  if (!confirm("Xóa khách hàng này?")) return;
  await deleteDoc(doc(db, "customers", id));
  closeDrawer();
};

window.addCallLog = async function() {
  const text = document.getElementById("new-log").value.trim();
  if (!text || !editingId) return;
  const c = customers.find(x=>x.id===editingId);
  const status = document.querySelector(".status-opt.active")?.dataset.s || c?.status || "warm";
  const logs = c?.callLogs || [];
  logs.push({ text, status, time: new Date().toLocaleString("vi-VN") });
  await updateDoc(doc(db, "customers", editingId), { callLogs: logs });
  document.getElementById("new-log").value = "";
  document.getElementById("call-logs").innerHTML = renderCallLogs(logs);
};

// ── AI ──
window.callAI = async function() {
  if (!GROQ_KEY) { alert("Anh vào Cài đặt nhập Groq API key trước nhé!"); return; }
  const sit = document.getElementById("ai-situation").value.trim();
  if (!sit) { alert("Nhập tình huống trước nhé!"); return; }
  const c = customers.find(x=>x.id===editingId);
  const resultEl = document.getElementById("ai-result");
  resultEl.innerHTML = '<div class="dots"><span></span><span></span><span></span></div> AI đang soạn...';
  resultEl.classList.add("show");

  const ctx = c ? `Thông tin khách: Tên ${c.name}, ngân sách ${c.budget||"chưa rõ"}, mục đích ${c.purpose||"chưa rõ"}, khu vực ${c.area||"chưa rõ"}, trạng thái ${c.status==="hot"?"Nóng":c.status==="warm"?"Ấm":"Lạnh"}. Ghi chú: ${c.note||"không có"}.` : "";

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role:"system", content:`Bạn là chuyên gia telesale BĐS Việt Nam, chuyên bán căn hộ chung cư tại TP.HCM. ${ctx} Đưa ra câu trả lời ngắn gọn, tự nhiên, thực chiến. Nếu soạn tin Zalo thì trả về tin nhắn sẵn sàng gửi. Nếu xử lý objection thì đưa câu thoại + 1 tip. Trả lời tiếng Việt.` },
          { role:"user", content: sit }
        ],
        max_tokens: 600,
        temperature: 0.7
      })
    });
    const data = await res.json();
    if (data.error) { resultEl.textContent = "Lỗi: " + data.error.message; return; }
    resultEl.textContent = data.choices?.[0]?.message?.content || "Không lấy được gợi ý.";
  } catch(e) {
    resultEl.textContent = "Lỗi kết nối. Kiểm tra API key và internet.";
  }
};

window.openAIZalo = function(id) {
  openDrawer(id);
  setTimeout(() => {
    const el = document.getElementById("ai-situation");
    if (el) { el.value = "Soạn tin Zalo follow-up phù hợp với thông tin khách này"; callAI(); }
  }, 300);
};

// ── SETTINGS ──
window.saveGroqKey = function() {
  const val = document.getElementById("groqKeyInput").value.trim();
  if (!val) return;
  GROQ_KEY = val;
  localStorage.setItem("bds_groq_key", val);
  document.getElementById("groq-status").textContent = "✓ Đã lưu! AI sẵn sàng hoạt động";
  updateApiStatus();
};

window.exportData = function() {
  const blob = new Blob([JSON.stringify(customers, null, 2)], {type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = `telesale_bds_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
};

// ── UTILS ──
function getTodayFollowups() {
  const today = new Date().toISOString().slice(0,10);
  return customers.filter(c => c.followupDate && c.followupDate <= today);
}

function getUpcomingFollowups() {
  const today = new Date().toISOString().slice(0,10);
  const week  = new Date(Date.now()+7*864e5).toISOString().slice(0,10);
  return customers.filter(c => c.followupDate && c.followupDate > today && c.followupDate <= week);
}

function formatFollowup(date) {
  const today = new Date().toISOString().slice(0,10);
  if (date < today) return `<span class="overdue">⚠ ${date}</span>`;
  if (date === today) return `<span class="due-today">⏰ Hôm nay</span>`;
  return `<span style="color:var(--text2)">${date}</span>`;
}

function updateFollowupBadge() {
  const n = getTodayFollowups().length;
  const el = document.getElementById("followup-badge");
  el.textContent = n; el.style.display = n ? "inline" : "none";
}

function updateApiStatus() {
  const dot   = document.getElementById("api-dot");
  const label = document.getElementById("api-label");
  if (GROQ_KEY) { dot.classList.remove("off"); label.textContent = "Groq AI sẵn sàng"; }
  else          { dot.classList.add("off");    label.textContent = "Chưa kết nối AI"; }
}

function attachPageEvents() {
  document.querySelectorAll(".filter-chip[data-filter]").forEach(el =>
    el.addEventListener("click", () => { activeFilter = el.dataset.filter; renderPage(); })
  );
}

window.handleSearch = function(val) {
  searchQuery = val.toLowerCase();
  if (activePage !== "customers") setPage("customers");
  else renderPage();
};

// ── INIT ──
updateApiStatus();
renderPage();
</script>
